# pins.yaml — the version-pin matrix of the inference-systems portfolio.
#
# This file is the authoritative, machine-readable record of which contract bundle,
# image digests, engine versions, model revisions, and config bundles are PROVEN
# TOGETHER, per integration milestone. Format: docs/interfaces.md §3 + ADR-0001.
# Validate with:  python3 pins/validate_pins.py
#
# Ledger rules:
#   - a pin bump is a new dated entry (or a dated update; git history is the ledger)
#   - `proven_at` may list a milestone ONLY if evidence exists under evidence/i<N>/
#   - `digest` is mandatory for container images (sha256:<64 hex>)
#   - volatile facts carry `reverify: true` ("as of <date> — re-verify at use time")
#
# STATUS (2026-07-11): I2 ACCEPTED (user review passed; evidence/i2/). The
# Scenario A pin set carries proven_at: [I2]. serving-contracts v0.2.0 released
# (tag at 484b449; remote pinnable ref release/v0.2.0 — git proxy drops tags, KI-1).
# I3 EXECUTED same day (Scenario B pin set below: contracts v0.2.0,
# infergate/mock 74f2372 host binaries, inferbench 69a5abc, engine-llamacpp
# 8f114a9, model-gguf Qwen2.5-1.5B-Instruct Q4_K_M); I3 ACCEPTED 2026-07-11.
# STATUS (2026-07-12): I4 recorded as a **CPU-fallback deviation** (G6 GPU
# session deferred by user decision 2026-07-11 — no GPU rental; evidence/i4/).
# The Scenario B pin set above stands in as the measured baseline for I4; the
# same six entries carry proven_at: [I3, I4] below. No vLLM/GPU pins exist —
# not claimed. See evidence/i4/checklist.md for the full acceptance mapping
# and the deferred-GPU-evidence list.
# STATUS (2026-07-12): I5 recorded (evidence/i5/): inferops operational stack
# (compose-pivot per inferops' own RQ-14 deviation — this sandbox cannot
# schedule any Kubernetes pod; Kustomize manifests authored + validated
# against a live k3s API server instead). infergate v0.1.0 RELEASE images
# (the program's first genuine tagged-release image pins) + the observability
# stack (OTel/Prometheus/Grafana/Tempo, upstream digests) + the llama.cpp
# CPU-fallback engine (same commit as engine-llamacpp) proven_at: [I5] below.
# Warm-up-aware readiness, zero-error rolling update, golden dashboards, and
# end-to-end traces (mock-backed AND, newly this session, llama.cpp-backed)
# all demonstrated. No pod scheduling, no vLLM/GPU claim anywhere — see
# evidence/i5/checklist.md §0 for both headline deviations.
# STATUS (2026-07-12): I7 recorded (evidence/i7/): the inferops 12-scenario
# Contract 6 fault-injection campaign (IO-T006/T007, commits bfca054/a1e0af5/
# a07fd2f), archived from the consumer side per IL-T007. All 12/12 scenarios
# injected; client impact measured by inferbench for the 5 mandated
# streaming-critical scenarios (1, 2, 5, 6, 12); 3 postmortems published
# (pm-001..pm-003). Headline findings surfaced, not buried: scenario 4 (slow
# client) is a real, reproducible deviation-documented finding, not a
# topology artifact — see evidence/i7/checklist.md §0.1; scenarios 1, 3, 7,
# 10 carry a documented structural single-backend-topology deviation — §0.2.
# No GPU/vLLM claim anywhere — continuation of I4/D-005 and I5/D-006's
# CPU-fallback. I7 acceptance review by the user is pending (I2/I3/I5
# precedent).
# Entries still expected (recorded here as comments, NOT claims):
#   - engine-vllm             v0.24.x baseline + exact commit, as of 2026-07 —
#                             re-verify + model/quantization/tokenizer +
#                             driver/CUDA + instance type   (needed for I4 GPU
#                             acceptance proper — CPU fallback recorded instead,
#                             see evidence/i4/)
#   - fleetlab-release        released version                       (needed for I6)

