# OTel Collector config for Scenario A: receive OTLP/HTTP traces from the
# gateway, export to a JSONL file (evidence artifact) and to the debug log.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  file:
    path: /otel/traces.jsonl
    flush_interval: 1s
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, debug]
