# OpenTelemetry Collector Builder (ocb) manifest for the Scenario A
# collector image — version-pinned; consumed by build.sh (deviation D-003:
# upstream collector images/release binaries unreachable through the egress
# proxy, so the collector is built from pinned released Go modules via the
# allowlisted module proxy).
dist:
  name: otelcol-scenario-a
  description: Minimal OTel Collector for inference-lab Scenario A (OTLP/HTTP in, file + debug out)
  output_path: ./build
  version: 0.156.0
receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.156.0
processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.156.0
exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/fileexporter v0.156.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.156.0
